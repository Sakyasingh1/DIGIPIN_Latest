openapi: 3.0.0

info:
  title:
  version: 2.0.0
  description: |
    DIGIPIN (Digital Postal Index Number) is India's National Geospatial Addressing Grid developed by the Department of Posts, Ministry of Communications, Government of India.
    DIGIPIN API provides services for:

    - Generating a DIGIPIN from geographic coordinates.
    - Decoding a DIGIPIN into geographic coordinates.

    DIGIPIN is India's National Geospatial Addressing Grid and is represented as a continuous 10-character alphanumeric identifier.

    DIGIPIN Validation Rules:

    - Must be exactly 10 characters in length.
    - Must contain only approved DIGIPIN characters:
      2, 3, 4, 5, 6, 7, 8, 9, C, J, K, L, M, P, F, T
    - Must not contain spaces.
    - Must not contain hyphens (-).
    - Must not contain special characters.
    - Alphabetic characters shall be uppercase.

servers:
  - url: http://localhost:5000/api

tags:
  - name: DIGIPIN
    description: DIGIPIN Encoding and Decoding Services

paths:

  /digipin/encode:

    get:
      tags:
        - DIGIPIN

      summary: Generate DIGIPIN from geographic coordinates

      description: |
        Encodes valid latitude and longitude coordinates into a
        standardized 10-character DIGIPIN.

      parameters:
        - name: latitude
          in: query
          required: true
          description: Latitude in decimal degrees.
          schema:
            type: number
            format: double
            example: 13.067526

        - name: longitude
          in: query
          required: true
          description: Longitude in decimal degrees.
          schema:
            type: number
            format: double
            example: 80.270956

      responses:
        '200':
          description: DIGIPIN generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  digipin:
                    type: string
                    example: "4T396F42L7"
              example:
                digipin: "4T396F42L7"

        '400':
          description: Invalid latitude or longitude
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Invalid latitude or longitude."

    post:
      tags:
        - DIGIPIN

      summary: Generate DIGIPIN from geographic coordinates

      description: |
        Encodes valid latitude and longitude coordinates into a
        standardized 10-character DIGIPIN.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

              required:
                - latitude
                - longitude

              properties:
                latitude:
                  type: number
                  format: double
                  example: 13.067526

                longitude:
                  type: number
                  format: double
                  example: 80.270956

            example:
              latitude: 13.067526
              longitude: 80.270956

      responses:
        '200':
          description: DIGIPIN generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  digipin:
                    type: string
                    example: "4T396F42L7"

              example:
                digipin: "4T396F42L7"

        '400':
          description: Invalid latitude or longitude
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              example:
                error: "Invalid latitude or longitude."

  /digipin/decode:

    get:
      tags:
        - DIGIPIN

      summary: Decode DIGIPIN into geographic coordinates

      description: |
        Decodes a valid DIGIPIN and returns the corresponding
        geographic coordinates.

        Example DIGIPIN:

        4T396F42L7

      parameters:
        - name: digipin
          in: query
          required: true
          description: |
            Continuous 10-character DIGIPIN.

            Example:
            4T396F42L7
          schema:
            type: string
            minLength: 10
            maxLength: 10
            pattern: "^[23456789CJKLMPFT]{10}$"
            example: "4T396F42L7"

      responses:
        '200':
          description: DIGIPIN decoded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  latitude:
                    type: number
                    example: 13.067526

                  longitude:
                    type: number
                    example: 80.270956

              example:
                latitude: 13.067526
                longitude: 80.270956

        '400':
          description: Invalid DIGIPIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              example:
                error: "Invalid DIGIPIN. DIGIPIN must be a continuous 10-character string containing only approved DIGIPIN characters."

    post:
      tags:
        - DIGIPIN

      summary: Decode DIGIPIN into geographic coordinates

      description: |
        Decodes a valid DIGIPIN and returns the corresponding
        geographic coordinates.

        Valid Example:
        4T396F42L7

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

              required:
                - digipin

              properties:
                digipin:
                  type: string
                  minLength: 10
                  maxLength: 10
                  pattern: "^[23456789CJKLMPFT]{10}$"
                  example: "4T396F42L7"

            example:
              digipin: "4T396F42L7"

      responses:
        '200':
          description: DIGIPIN decoded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  latitude:
                    type: number
                    example: 13.067526

                  longitude:
                    type: number
                    example: 80.270956

              example:
                latitude: 13.067526
                longitude: 80.270956

        '400':
          description: Invalid DIGIPIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              example:
                error: "Invalid DIGIPIN. DIGIPIN must be a continuous 10-character string containing only approved DIGIPIN characters."

components:

  schemas:

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Invalid request."